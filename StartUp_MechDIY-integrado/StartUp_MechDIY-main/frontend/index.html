<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MechDIY — Tutoriais de Manutenção Automotiva</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-elevated: #14141c;
      --bg-card: #1a1a24;
      --border: #2a2a38;
      --text: #f5f5f7;
      --text-muted: #8b8b9a;
      --accent: #ff4d2e;
      --accent-hover: #ff6b4f;
      --success: #3bf5a1;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    header {
      border-bottom: 1px solid var(--border);
      background: rgba(10, 10, 15, 0.8);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #ff8a5b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #fff;
    }

    .logo-mech { color: var(--text); }
    .logo-diy { color: var(--accent); }

    .header-meta {
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    .hero {
      margin-bottom: 3rem;
    }

    .hero h1 {
      font-size: 2.75rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1rem;
      max-width: 700px;
    }

    .hero h1 span {
      background: linear-gradient(90deg, var(--accent), #ffb84d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      color: var(--text-muted);
      font-size: 1.125rem;
      max-width: 600px;
      line-height: 1.6;
    }

    .toolbar {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .search {
      flex: 1;
      min-width: 280px;
      position: relative;
    }

    .search input {
      width: 100%;
      padding: 0.875rem 1rem 0.875rem 2.75rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s;
    }

    .search input:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--bg-card);
    }

    .search svg {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, background 0.15s;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      background: var(--bg-elevated);
    }

    .card-brand {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .card-model {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    .card-meta {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .card-items {
      color: var(--text-muted);
      font-size: 0.8125rem;
    }

    .card-arrow {
      color: var(--accent);
      font-weight: 600;
      font-size: 0.875rem;
    }

    .empty, .loading, .error {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .error {
      color: #ff8888;
      background: rgba(255, 70, 70, 0.05);
      border: 1px solid rgba(255, 70, 70, 0.2);
      border-radius: 12px;
    }

    .error code {
      background: rgba(255, 255, 255, 0.05);
      padding: 0.125rem 0.5rem;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem;
      overflow-y: auto;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 900px;
      width: 100%;
      margin: auto;
      padding: 2rem;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .modal-close:hover { background: var(--accent); border-color: var(--accent); }

    .modal-header {
      margin-bottom: 2rem;
      padding-right: 3rem;
    }

    .modal-brand {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .modal-title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .modal-meta {
      color: var(--text-muted);
    }

    .item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .item-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .item-tipo {
      background: var(--accent);
      color: #fff;
      padding: 0.25rem 0.75rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .item-descricao {
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .item-actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
    }

    .btn:hover { border-color: var(--accent); }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    .video-wrapper {
      margin-top: 1rem;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
      display: none;
    }

    .video-wrapper.open { display: block; }
    .video-wrapper video { width: 100%; display: block; }

    @media (max-width: 640px) {
      .hero h1 { font-size: 2rem; }
      .header-inner, main { padding-left: 1.25rem; padding-right: 1.25rem; }
      .modal { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-mark">M</div>
        <div><span class="logo-mech">Mech</span><span class="logo-diy">DIY</span></div>
      </div>
      <div class="header-meta">Tutoriais de manutenção automotiva</div>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>Manutenção do seu carro, <span>passo a passo</span>.</h1>
      <p>Selecione um veículo abaixo para ver os tutoriais em vídeo de filtros, baterias e outros itens. Em dúvida sobre por onde começar? Use o assistente no canto inferior.</p>
    </section>

    <div class="toolbar">
      <div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
        <input id="busca" type="text" placeholder="Buscar por marca ou modelo..." autocomplete="off" />
      </div>
    </div>

    <div id="grid" class="grid">
      <div class="loading">Carregando veículos...</div>
    </div>
  </main>

  <div id="modal" class="modal-backdrop" role="dialog" aria-modal="true">
    <div class="modal">
      <button class="modal-close" aria-label="Fechar">×</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8080/api';

    const $grid = document.getElementById('grid');
    const $busca = document.getElementById('busca');
    const $modal = document.getElementById('modal');
    const $modalContent = document.getElementById('modal-content');
    const $modalClose = $modal.querySelector('.modal-close');

    let carrosCache = [];
    let timerBusca = null;

    async function fetchAPI(path) {
      const resp = await fetch(API_BASE + path);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return resp.json();
    }

    async function carregarCarros(termo = '') {
      $grid.innerHTML = '<div class="loading">Carregando veículos...</div>';
      try {
        const path = termo
          ? `/carros/buscar?termo=${encodeURIComponent(termo)}`
          : '/carros';
        const carros = await fetchAPI(path);
        carrosCache = carros;
        renderGrid(carros);
      } catch (err) {
        $grid.innerHTML = `
          <div class="error">
            <p style="font-weight:600;margin-bottom:.5rem">Não foi possível carregar os veículos.</p>
            <p>Verifique se o backend está rodando em <code>http://localhost:8080</code>.</p>
            <p style="margin-top:.5rem;font-size:.85rem;opacity:.7">${err.message}</p>
          </div>
        `;
      }
    }

    function renderGrid(carros) {
      if (!carros || carros.length === 0) {
        $grid.innerHTML = '<div class="empty">Nenhum veículo encontrado.</div>';
        return;
      }
      $grid.innerHTML = carros.map(c => `
        <article class="card" data-id="${c.id}" tabindex="0" role="button">
          <div class="card-brand">${escapeHtml(c.marca)}</div>
          <div class="card-model">${escapeHtml(c.modelo)}</div>
          <div class="card-meta">${c.ano} · ${escapeHtml(c.versao || '')}</div>
          <div class="card-footer">
            <span class="card-items">${c.quantidadeItens} ${c.quantidadeItens === 1 ? 'tutorial' : 'tutoriais'}</span>
            <span class="card-arrow">Ver detalhes →</span>
          </div>
        </article>
      `).join('');

      $grid.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => abrirCarro(card.dataset.id));
        card.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            abrirCarro(card.dataset.id);
          }
        });
      });
    }

    async function abrirCarro(id) {
      $modalContent.innerHTML = '<div class="loading">Carregando tutoriais...</div>';
      $modal.classList.add('open');
      document.body.style.overflow = 'hidden';

      try {
        const carro = await fetchAPI(`/carros/${id}`);
        $modalContent.innerHTML = `
          <div class="modal-header">
            <div class="modal-brand">${escapeHtml(carro.marca)}</div>
            <h2 class="modal-title">${escapeHtml(carro.modelo)}</h2>
            <div class="modal-meta">${carro.ano} · ${escapeHtml(carro.versao || '')}</div>
          </div>
          ${(carro.itensManutencao || []).map(item => `
            <div class="item">
              <div class="item-header">
                <span class="item-tipo">${escapeHtml(item.tipo.replace('_', ' '))}</span>
              </div>
              <p class="item-descricao">${escapeHtml(item.descricao)}</p>
              <div class="item-actions">
                ${item.urlVideo ? `<button class="btn btn-primary" data-video="${escapeHtml(item.urlVideo)}">▶ Assistir tutorial</button>` : ''}
                ${item.urlProduto ? `<a class="btn" href="${escapeHtml(item.urlProduto)}" target="_blank" rel="noopener">🛒 Ver produto</a>` : ''}
              </div>
              <div class="video-wrapper">
                <video controls preload="none"></video>
              </div>
            </div>
          `).join('')}
        `;

        $modalContent.querySelectorAll('[data-video]').forEach(btn => {
          btn.addEventListener('click', () => {
            const wrapper = btn.closest('.item').querySelector('.video-wrapper');
            const video = wrapper.querySelector('video');
            if (!wrapper.classList.contains('open')) {
              video.src = btn.dataset.video;
              wrapper.classList.add('open');
              btn.textContent = '⏸ Ocultar vídeo';
            } else {
              video.pause();
              wrapper.classList.remove('open');
              btn.textContent = '▶ Assistir tutorial';
            }
          });
        });

      } catch (err) {
        $modalContent.innerHTML = `<div class="error">Erro ao carregar detalhes: ${err.message}</div>`;
      }
    }

    function fecharModal() {
      $modal.classList.remove('open');
      document.body.style.overflow = '';
      $modalContent.querySelectorAll('video').forEach(v => v.pause());
    }

    $modalClose.addEventListener('click', fecharModal);
    $modal.addEventListener('click', e => { if (e.target === $modal) fecharModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharModal(); });

    $busca.addEventListener('input', () => {
      clearTimeout(timerBusca);
      timerBusca = setTimeout(() => carregarCarros($busca.value.trim()), 300);
    });

    function escapeHtml(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    carregarCarros();
  </script>

  <!-- Botpress Webchat -->
  <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
  <script src="https://files.bpcontent.cloud/2026/05/09/13/20260509131809-BCFXVQ4N.js" defer></script>
</body>
</html>
