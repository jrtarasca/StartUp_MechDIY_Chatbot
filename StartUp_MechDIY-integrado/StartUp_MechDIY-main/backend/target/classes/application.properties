# ============================================================
# Configurações gerais da aplicação
# ============================================================
spring.application.name=mechdiy-backend
server.port=8080

# ============================================================
# Banco de dados H2 (em memória - apenas para desenvolvimento)
# Para produção, substitua por PostgreSQL ou MySQL
# ============================================================
spring.datasource.url=jdbc:h2:mem:mechdiydb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================================
# JPA / Hibernate
# create-drop: recria o banco toda vez que a aplicação sobe
# Trocar para "update" se quiser persistir dados entre reinicializações
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# Console web do H2 — acessível em http://localhost:8080/h2-console
# Útil para visualizar o banco de dados durante o desenvolvimento
# ============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# Swagger UI — documentação visual dos endpoints
# Acesse: http://localhost:8080/swagger-ui.html
# JSON da spec: http://localhost:8080/v3/api-docs
# ============================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# ============================================================
# Dados carregados de src/main/resources/dados/carros.json
# na inicialização via InicializadorDados (CommandLineRunner)
# ============================================================
